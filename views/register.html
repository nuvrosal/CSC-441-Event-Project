<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Project - Register</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            max-width: 400px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #successMessage {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #c3e6cb;
            display: none;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Event Browsing & Registration</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/events">Events</a>
            <a href="/calendar">Calendar</a>
            <a href="/event-details">Event Details</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
        <h2>Register / RSVP for an Event</h2>
        <p>Fill out the form below to secure your spot at one of our upcoming events.</p>

        <form id="rsvpForm">
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required placeholder="John">
            </div>

            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required placeholder="Doe">
            </div>

            <div class="form-group">
                <label for="eventSelect">Select Event:</label>
                <select id="eventSelect" name="eventSelect" required>
                    <option value="" disabled selected>-- Choose an event --</option>
                </select>
            </div>

            <button type="submit">Submit RSVP</button>
        </form>

        <div id="successMessage"></div>
    </main>

    <script>
        function showMessage(message, isError = false) {
            const messageElement = document.getElementById('successMessage');
            messageElement.innerHTML = message;
            messageElement.style.color = isError ? '#721c24' : '#155724';
            messageElement.style.backgroundColor = isError ? '#f8d7da' : '#d4edda';
            messageElement.style.borderColor = isError ? '#f5c6cb' : '#c3e6cb';
            messageElement.style.display = 'block';
        }

        async function loadEventOptions() {
            const select = document.getElementById('eventSelect');
            const params = new URLSearchParams(window.location.search);
            const selectedEventId = params.get('event');

            try {
                const response = await fetch('/api/events');

                if (!response.ok) {
                    throw new Error('Events could not be loaded.');
                }

                const events = await response.json();

                events.forEach(eventItem => {
                    const option = document.createElement('option');
                    option.value = eventItem.event_id;
                    option.textContent = eventItem.event_title;

                    if (selectedEventId && selectedEventId === String(eventItem.event_id)) {
                        option.selected = true;
                    }

                    select.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                showMessage('Could not load events. Make sure the database is running.', true);
            }
        }

        document.getElementById('rsvpForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const eventId = document.getElementById('eventSelect').value;
            const eventName = document.getElementById('eventSelect').options[document.getElementById('eventSelect').selectedIndex].text;

            const registrationData = {
                firstName,
                lastName,
                eventId
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(registrationData)
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage(`<strong>Thank you, ${firstName}!</strong> Your registration for <em>${eventName}</em> was saved.`);
                    document.getElementById('rsvpForm').reset();
                } else {
                    showMessage(`<strong>Error:</strong> ${result.message}`, true);
                }
            } catch (error) {
                console.error('Network Error:', error);
                showMessage('Could not reach the server. Make sure your backend and database are running.', true);
            }
        });

        loadEventOptions();
    </script>
</body>
</html>
