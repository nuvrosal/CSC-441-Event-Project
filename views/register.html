<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Project - Register</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        /* Optional internal styles to keep the form looking tidy if main.css doesn't cover it */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            max-width: 400px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #successMessage {
            margin-top: 15px;
            padding: 10px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: none;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Event Browsing & Registration</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/events">Events</a>
            <a href="/event-details">Event Details</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
        <h2>Register / RSVP for an Event</h2>
        <p>Fill out the form below to secure your spot at one of our upcoming events.</p>

        <form id="rsvpForm">
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="eventSelect">Select Event:</label>
                <select id="eventSelect" name="eventSelect" required>
                    <option value="" disabled selected>-- Choose an event --</option>
                    <option value="tech-conference">Tech Conference 2024 (San Francisco)</option>
                    <option value="health-expo">Health and Wellness Expo (New York)</option>
                    <option value="art-festival">Art and Culture Festival (Chicago)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="guests">Number of Guests:</label>
                <input type="number" id="guests" name="guests" min="0" max="5" value="0">
            </div>

            <button type="submit">Submit RSVP</button>
        </form>

        <div id="successMessage"></div>
    </main>

    <script>
        document.getElementById('rsvpForm').addEventListener('submit', async function(event) {
            // Prevent the default form submission (page reload)
            event.preventDefault();

            // 1. Grab the values from the form inputs
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const eventValue = document.getElementById('eventSelect').value;
            const eventName = document.getElementById('eventSelect').options[document.getElementById('eventSelect').selectedIndex].text;
            const guests = document.getElementById('guests').value;

            // 2. Package data into a clean JSON object
            const updatedData = {
                fullName: name,
                email: email,
                eventSelected: eventValue,
                guests: parseInt(guests, 10)
            };

            try {
                // 3. Send the asynchronous PUT request to the backend server
                // Note: Change '/api/register' if your backend endpoint uses a different URL path
                const response = await fetch('/api/register', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                // 4. Handle response from the server
                if (response.ok) {
                    const messageElement = document.getElementById('successMessage');
                    
                    // Display the local confirmation message dynamically
                    messageElement.innerHTML = `<strong>Thank you, ${name}!</strong> Your registration for the <em>${eventName}</em> has been updated successfully.`;
                    messageElement.style.color = '#155724';
                    messageElement.style.backgroundColor = '#d4edda';
                    messageElement.style.borderColor = '#c3e6cb';
                    messageElement.style.display = 'block';

                    // Clear the form fields
                    document.getElementById('rsvpForm').reset();
                } else {
                    // Display error styling if the server throws an error code
                    const messageElement = document.getElementById('successMessage');
                    messageElement.innerHTML = `<strong>Error:</strong> Failed to update registration. Server returned status code: ${response.status}`;
                    messageElement.style.color = '#721c24';
                    messageElement.style.backgroundColor = '#f8d7da';
                    messageElement.style.borderColor = '#f5c6cb';
                    messageElement.style.display = 'block';
                }

            } catch (error) {
                console.error('Network Error:', error);
                alert('Could not reach the server. Please ensure your backend is running.');
            }
        });
    </script>
</body>
</html>
