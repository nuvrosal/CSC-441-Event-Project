<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Project - Events</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header>
        <h1>Event Browsing & Registration</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/events">Events</a>
            <a href="/calendar">Calendar</a>
            <a href="/event-details">Event Details</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main class="events-page">
        <h2>Upcoming Events</h2>
        <p class="page-intro">Browse local San Diego events and click View Details to learn more or register.</p>

        <div id="eventList" class="event-grid">
            <div class="event-card">Loading events...</div>
        </div>
    </main>

    <script>
        function formatDate(value) {
            const date = new Date(value);
            return date.toLocaleDateString(undefined, {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadEvents() {
            const eventList = document.getElementById('eventList');

            try {
                const response = await fetch('/api/events');

                if (!response.ok) {
                    throw new Error('Events could not be loaded.');
                }

                const events = await response.json();
                eventList.innerHTML = '';

                if (events.length === 0) {
                    eventList.innerHTML = '<div class="event-card">No events have been added yet.</div>';
                    return;
                }

                events.forEach(eventItem => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <h3>${eventItem.event_title}</h3>
                        <p><strong>Date:</strong> ${formatDate(eventItem.event_date)}</p>
                        <p><strong>Location:</strong> ${eventItem.event_location}</p>
                        <a class="btn" href="/event-details?event=${eventItem.event_id}">View Details</a>
                    `;
                    eventList.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                eventList.innerHTML = '<div class="event-card">Could not load events. Make sure the database is running.</div>';
            }
        }

        loadEvents();
    </script>
</body>
</html>
